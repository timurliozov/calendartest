<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <h2>Calendar</h2>

        <button class="new-event-btn" onclick="openModal()">
            + New Event
        </button>

        <div class="categories">
            <h3>Categories</h3>

            <div class="category">
                <span class="dot vimportant"></span>
                Very Important
            </div>

            <div class="category">
                <span class="dot important"></span>
                Important
            </div>

            <div class="category">
                <span class="dot nimportant"></span>
                Not Important
            </div>
        </div>

        <aside class="upcoming">

            <h2>Upcoming</h2>

            <div id="upcomingEvents"></div>

        </aside>

    </aside>

    <main class="calendar-container">

        <div class="calendar-header">
            <button onclick="prevMonth()">◀</button>

            <h1 id="monthYear"></h1>

            <button onclick="nextMonth()">▶</button>
        </div>

        <div class="weekdays">
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
            <div>Sun</div>
        </div>

        <div class="calendar" id="calendar"></div>




    </main>

</div>

<div class="modal" id="modal">

    <div class="modal-content">

        <h2>Create Event</h2>

        <input type="text" id="eventTitle" placeholder="Event title">

        <input type="date" id="eventDate">

        <select id="eventCategory">
            <option value="vimportant">Very Important</option>
            <option value="important">Important</option>
            <option value="nimportant">Not Important</option>
        </select>

        <div class="modal-buttons">
            <button onclick="addEvent()">Save</button>
            <button onclick="closeModal()">Cancel</button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
